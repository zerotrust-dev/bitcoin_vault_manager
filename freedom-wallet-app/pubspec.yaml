name: freedom_wallet
description: Bitcoin Vault Manager - Self-custody made simple
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^12.0.0

  # FFI (for Rust core bridge)
  ffi: ^2.1.0

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # UI Components
  flutter_svg: ^2.0.0

  # Hardware wallet communication
  http: ^1.1.0

  # Utilities
  intl: ^0.18.0
  uuid: ^4.2.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  mockito: ^5.4.0

flutter:
  uses-material-design: true
